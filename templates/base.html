{% load static %}
<!doctype html>
<html lang="en" x-data="{ dark: localStorage.theme === 'dark', sidebar: false }" x-bind:class="dark ? 'dark' : ''">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title|default:"Waste Circular Platform" }} | CircuGreen AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            civic: { green: '#16a34a', blue: '#0284c7', ink: '#101827' }
          },
          boxShadow: { glow: '0 0 40px rgba(34,197,94,.18)' }
        }
      }
    }
  </script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="bg-slate-100 text-slate-900 antialiased dark:bg-[#07111f] dark:text-slate-100">
  <div class="min-h-screen lg:flex">
    {% include "components/sidebar.html" %}
    <div class="min-w-0 flex-1">
      {% include "components/topbar.html" %}
      <main class="mx-auto max-w-7xl px-4 py-5 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
  <script src="{% static 'js/charts.js' %}"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
