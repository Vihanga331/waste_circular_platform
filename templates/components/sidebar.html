<aside class="fixed inset-y-0 left-0 z-40 w-72 -translate-x-full border-r border-white/10 bg-[#07111f]/95 p-4 text-white backdrop-blur-xl transition lg:static lg:translate-x-0" x-bind:class="sidebar ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'">
  <div class="mb-7 flex items-center gap-3 px-2">
    <span class="grid h-10 w-10 place-items-center bg-emerald-500 text-white shadow-glow"><i data-lucide="leaf"></i></span>
    <div>
      <p class="font-semibold">CircuGreen AI</p>
      <p class="text-xs text-slate-400">Circular city OS</p>
    </div>
  </div>
  <nav class="space-y-1">
    {% for label, url_name, icon in nav_items %}
      <a href="{% url url_name %}" class="nav-link {% if section in label|lower %}active{% endif %}">
        <i data-lucide="{{ icon }}" class="h-4 w-4"></i><span>{{ label }}</span>
      </a>
    {% endfor %}
  </nav>
  <div class="mt-7 border-t border-white/10 pt-5">
    <p class="mb-3 px-2 text-xs font-semibold uppercase text-slate-500">Future expansion</p>
    <div class="space-y-1">
      {% for item in future_items %}
        <div class="flex items-center justify-between px-2 py-2 text-sm text-slate-400">
          <span>{{ item }}</span><i data-lucide="lock" class="h-3.5 w-3.5"></i>
        </div>
      {% endfor %}
    </div>
  </div>
</aside>
<div class="fixed inset-0 z-30 bg-slate-950/60 lg:hidden" x-show="sidebar" x-on:click="sidebar=false" x-transition></div>
