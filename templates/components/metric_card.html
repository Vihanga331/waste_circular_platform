<article class="glass-card p-5">
  <div class="flex items-start justify-between">
    <div>
      <p class="text-sm text-slate-500 dark:text-slate-400">{{ metric.label }}</p>
      <p class="mt-2 text-3xl font-semibold">{{ metric.value }}</p>
    </div>
    <span class="status-pill success">{{ metric.delta }}</span>
  </div>
  <div class="mt-5 h-2 overflow-hidden bg-slate-200 dark:bg-white/10">
    <div class="h-full w-3/4 bg-gradient-to-r from-emerald-400 to-sky-400"></div>
  </div>
</article>
