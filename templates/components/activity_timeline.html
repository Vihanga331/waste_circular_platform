<div class="glass-card p-5">
  <div class="mb-4 flex items-center justify-between">
    <h2 class="section-title">Live Activity</h2>
    <span class="status-pill success">HTMX ready</span>
  </div>
  <div class="space-y-4">
    {% for time, item in timeline %}
      <div class="flex gap-3">
        <div class="w-14 shrink-0 text-sm font-medium text-sky-600 dark:text-sky-300">{{ time }}</div>
        <div class="relative border-l border-slate-200 pl-4 text-sm text-slate-600 dark:border-white/10 dark:text-slate-300">
          <span class="absolute -left-1.5 top-1.5 h-3 w-3 bg-emerald-500"></span>
          {{ item }}
        </div>
      </div>
    {% endfor %}
  </div>
</div>
