<header class="sticky top-0 z-20 border-b border-slate-200/80 bg-white/80 backdrop-blur-xl dark:border-white/10 dark:bg-[#07111f]/80">
  <div class="flex h-16 items-center justify-between px-4 sm:px-6 lg:px-8">
    <div class="flex min-w-0 items-center gap-3">
      <button class="icon-btn lg:hidden" x-on:click="sidebar = true" aria-label="Open navigation"><i data-lucide="menu"></i></button>
      <div class="min-w-0">
        <p class="truncate text-sm text-slate-500 dark:text-slate-400">Smart-city SaaS platform</p>
        <h1 class="truncate text-lg font-semibold">{{ title|default:"Dashboard" }}</h1>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <a class="icon-btn" href="{% url 'core:notifications' %}" aria-label="Notifications"><i data-lucide="bell"></i></a>
      <button class="icon-btn" x-on:click="dark = !dark; localStorage.theme = dark ? 'dark' : 'light'" aria-label="Toggle theme"><i data-lucide="moon"></i></button>
      <a class="hidden items-center gap-2 border border-slate-200 bg-white px-3 py-2 text-sm font-medium dark:border-white/10 dark:bg-white/5 sm:flex" href="{% url 'accounts:profile' %}">
        <span class="grid h-7 w-7 place-items-center bg-emerald-100 text-emerald-700 dark:bg-emerald-400/15 dark:text-emerald-200">CG</span>
        <span>Admin</span>
      </a>
    </div>
  </div>
</header>
