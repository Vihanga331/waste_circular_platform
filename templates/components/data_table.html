<div class="glass-card overflow-hidden">
  <div class="flex items-center justify-between border-b border-slate-200 p-5 dark:border-white/10">
    <h2 class="section-title">{{ table_title|default:"Operational Queue" }}</h2>
    <button class="btn-secondary"><i data-lucide="download" class="h-4 w-4"></i>Export</button>
  </div>
  <div class="overflow-x-auto">
    <table class="min-w-full text-left text-sm">
      <thead class="bg-slate-50 text-xs uppercase text-slate-500 dark:bg-white/5 dark:text-slate-400">
        <tr>
          <th class="px-5 py-3">Route</th>
          <th class="px-5 py-3">Worker</th>
          <th class="px-5 py-3">Truck</th>
          <th class="px-5 py-3">Status</th>
          <th class="px-5 py-3">Progress</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-200 dark:divide-white/10">
        {% for row in collections %}
          <tr>
            <td class="px-5 py-4 font-medium">{{ row.route }}</td>
            <td class="px-5 py-4 text-slate-600 dark:text-slate-300">{{ row.worker }}</td>
            <td class="px-5 py-4">{{ row.truck }}</td>
            <td class="px-5 py-4">{% include "components/status_badge.html" with status=row.status %}</td>
            <td class="px-5 py-4">
              <div class="h-2 w-36 bg-slate-200 dark:bg-white/10"><div class="h-full bg-sky-500" style="width: {{ row.progress }}%"></div></div>
            </td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
