{% extends "base_auth.html" %}
{% block auth_content %}
<div class="border border-white/10 bg-white/10 p-6 text-center backdrop-blur-xl">
  <div class="mx-auto grid h-14 w-14 place-items-center bg-emerald-500/20 text-emerald-200"><i data-lucide="mail-check"></i></div>
  <h1 class="mt-5 text-2xl font-semibold">Verify your email</h1>
  <p class="mt-2 text-sm text-slate-300">Email verification placeholder. Production will use signed Django tokens and optional OTP/MFA.</p>
  <a class="btn-primary mt-6" href="{% url 'accounts:login' %}">Continue to login</a>
</div>
{% endblock %}
