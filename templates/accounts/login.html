{% extends "base_auth.html" %}
{% block auth_content %}
<div class="mb-8 lg:hidden">
  <div class="flex items-center gap-3"><span class="grid h-10 w-10 place-items-center bg-emerald-500"><i data-lucide="leaf"></i></span><strong>CircuGreen AI</strong></div>
</div>
<div class="border border-white/10 bg-white/10 p-6 backdrop-blur-xl">
  <h1 class="text-2xl font-semibold">Welcome back</h1>
  <p class="mt-2 text-sm text-slate-300">Prepared for Django Authentication, RBAC, session security, and future JWT mobile access.</p>
  <form class="mt-6 space-y-4" method="post">
    {% csrf_token %}
    <label class="block text-sm">Email or username<input class="field mt-1" placeholder="admin@circugreen.ai"></label>
    <label class="block text-sm">Password<input class="field mt-1" type="password" placeholder="••••••••"></label>
    <div class="flex items-center justify-between text-sm">
      <label class="flex items-center gap-2"><input type="checkbox">Remember session</label>
      <a class="text-emerald-200" href="{% url 'accounts:forgot_password' %}">Forgot password?</a>
    </div>
    <a class="btn-primary w-full" href="{% url 'core:dashboard' %}"><i data-lucide="log-in" class="h-4 w-4"></i>Sign in to dashboard</a>
  </form>
  <p class="mt-5 text-sm text-slate-300">New city account? <a class="text-emerald-200" href="{% url 'accounts:signup' %}">Create one</a></p>
</div>
{% endblock %}
