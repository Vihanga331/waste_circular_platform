{% extends "base.html" %}
{% block content %}
<section class="grid gap-5 lg:grid-cols-2">
  <div class="glass-card p-5">
    <h2 class="section-title">API Settings</h2>
    <div class="mt-4 space-y-4">
      <label class="block text-sm">API base URL<input class="field mt-1" value="/api/"></label>
      <label class="block text-sm">Webhook endpoint<input class="field mt-1" placeholder="https://example.com/webhooks/waste"></label>
      <button class="btn-primary">Save API settings</button>
    </div>
  </div>
  <div class="glass-card p-5">
    <h2 class="section-title">System Monitoring</h2>
    <div class="mt-4 space-y-3 text-sm">
      <p class="flex justify-between"><span>Django sessions</span><span class="status-pill success">Ready</span></p>
      <p class="flex justify-between"><span>JWT mobile API</span><span class="status-pill neutral">Planned</span></p>
      <p class="flex justify-between"><span>WebSocket updates</span><span class="status-pill neutral">Planned</span></p>
      <p class="flex justify-between"><span>PostgreSQL</span><span class="status-pill success">Configured</span></p>
    </div>
  </div>
  <div class="glass-card p-5 lg:col-span-2">
    <h2 class="section-title">Permissions UI</h2>
    <div class="mt-4 grid gap-3 md:grid-cols-5">
      <span class="status-pill success">citizen</span>
      <span class="status-pill success">collection worker</span>
      <span class="status-pill success">methane plant operator</span>
      <span class="status-pill success">admin</span>
      <span class="status-pill success">government officer</span>
    </div>
  </div>
</section>
{% endblock %}
