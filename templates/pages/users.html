{% extends "base.html" %}
{% block content %}

    <button class="btn-primary"><i data-lucide="user-plus" class="h-4 w-4"></i>Add user</button>

  <div class="overflow-x-auto">
    <table class="min-w-full text-left text-sm">

        <tr><td class="px-5 py-4">Ravi Fernando</td><td>methane plant operator</td><td><span class="status-pill success">Active</span></td><td>Desktop</td></tr>
        <tr><td class="px-5 py-4">Maya Chen</td><td>government officer</td><td><span class="status-pill neutral">Review</span></td><td>Desktop</td></tr>
      </tbody>
    </table>
  </div>
