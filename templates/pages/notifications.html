{% extends "base.html" %}
{% block content %}
<section class="glass-card p-5">
  <h2 class="section-title">Notification Center</h2>
  <div class="mt-5 space-y-3">
    {% for item in notifications %}
      <div class="flex items-start justify-between gap-4 border border-slate-200 p-4 dark:border-white/10">
        <div class="flex gap-3"><i data-lucide="bell-ring" class="h-5 w-5 text-emerald-500"></i><p>{{ item }}</p></div>
        <span class="status-pill neutral">Unread</span>
      </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
